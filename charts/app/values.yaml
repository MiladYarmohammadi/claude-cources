# Default values for the generic "app" chart.
# Secure and production-sane by default; per-env overrides live in the
# GitOps repo under apps/<name>/envs/<env>/values.yaml.

nameOverride: ""
fullnameOverride: ""

image:
  repository: registry.example.com/group/app
  # Immutable tag written by CI (deploy-gitops template). Never use "latest".
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
#  - name: regcred

replicaCount: 2

# Extra labels/annotations applied to all rendered resources
commonLabels: {}
commonAnnotations: {}

podLabels: {}
podAnnotations: {}

command: []
args: []

containerPort: 8080

env: []
#  - name: LOG_LEVEL
#    value: info

# Bulk env from ConfigMaps/Secrets managed outside this chart
# (pair with External Secrets Operator for secret material).
envFrom: []
#  - secretRef:
#      name: app-secrets
#  - configMapRef:
#      name: app-config

# Inline config rendered into a ConfigMap and mounted at config.mountPath
config:
  enabled: false
  mountPath: /etc/app
  data: {}
  #  application.yaml: |
  #    server:
  #      port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    # Best practice: set a memory limit, leave CPU unlimited (no throttling).
    memory: 256Mi

probes:
  liveness:
    enabled: true
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    enabled: true
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    enabled: false
    path: /healthz
    periodSeconds: 5
    failureThreshold: 30

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# Writable scratch space since the rootfs is read-only
tmpVolume:
  enabled: true
  mountPath: /tmp
  sizeLimit: 64Mi

extraVolumes: []
extraVolumeMounts: []

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: nginx
  annotations: {}
  #  cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts: []
  #  - host: app.example.com
  #    paths:
  #      - path: /
  #        pathType: Prefix
  tls: []
  #  - secretName: app-tls
  #    hosts: [app.example.com]

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automountServiceAccountToken: false

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: null
  behavior: {}

podDisruptionBudget:
  enabled: true
  # Only rendered when replicaCount > 1 or autoscaling is enabled
  minAvailable: 1
  # maxUnavailable: 1   # use one of the two

networkPolicy:
  enabled: true
  # Ingress to the pod: same-namespace by default; add selectors as needed.
  ingress:
    - from:
        - podSelector: {}
  # Egress open by default (DNS + all); tighten per app.
  egress:
    - {}

metrics:
  enabled: false
  port: 9090
  path: /metrics
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 0

terminationGracePeriodSeconds: 30
priorityClassName: ""

nodeSelector: {}
tolerations: []
affinity: {}

# Spread replicas across nodes/zones by default
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector: {}   # filled with selector labels by the template
