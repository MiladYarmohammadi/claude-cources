# demo-app / staging — production-like sizing for realistic testing.
image:
  repository: registry.gitlab.example.com/team/demo-app
  tag: "0000000"   # written by CI on manual promotion — do not edit by hand

replicaCount: 2

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: demo-app.staging.example.com
      paths:
        - path: /
  tls:
    - secretName: demo-app-tls
      hosts: [demo-app.staging.example.com]
