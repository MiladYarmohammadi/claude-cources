# ============================================================================
# deploy-gitops.gitlab-ci.yml — pull-based deployment via the GitOps repo
#
# CI never talks to the cluster. Instead, these jobs clone the GitOps repo,
# bump the image tag in the app's env values file with yq, and push. Argo CD
# detects the commit and reconciles.
#
# Required CI/CD variables (set on the child project or its group):
#   GITOPS_REPO         host/path of the GitOps repo, e.g. gitlab.example.com/platform/gitops.git
#   GITOPS_TOKEN        project access token with write_repository on GITOPS_REPO
#                       (masked; created with role Developer, scope write_repository)
# Optional:
#   GITOPS_BRANCH       target branch (default: main)
#   GITOPS_VALUES_PATH  values file to patch, supports $ENVIRONMENT
#                       default: apps/$APP_NAME/envs/$ENVIRONMENT/values.yaml
#   GITOPS_IMAGE_KEY    yq path of the tag field (default: .image.tag)
#
# Flow: dev deploys automatically from the default branch; staging and
# production are manual promotions of the SAME immutable image tag.
# ============================================================================

.deploy:gitops:
  stage: deploy
  image:
    name: "$YQ_IMAGE"
    entrypoint: [""]
  variables:
    GIT_STRATEGY: none                   # we only touch the GitOps repo
    GITOPS_BRANCH: "main"
    GITOPS_VALUES_PATH: "apps/$APP_NAME/envs/$ENVIRONMENT/values.yaml"
    GITOPS_IMAGE_KEY: ".image.tag"
  before_script:
    - apk add --no-cache git >/dev/null
    - test -n "$GITOPS_REPO"  || { echo "GITOPS_REPO is not set" >&2; exit 1; }
    - test -n "$GITOPS_TOKEN" || { echo "GITOPS_TOKEN is not set" >&2; exit 1; }
    - git config --global user.name "gitlab-ci[$APP_NAME]"
    - git config --global user.email "gitlab-ci@$CI_SERVER_HOST"
  script:
    - git clone --depth 1 --branch "$GITOPS_BRANCH" "https://gitops-token:$GITOPS_TOKEN@$GITOPS_REPO" gitops
    - cd gitops
    - test -f "$GITOPS_VALUES_PATH" || { echo "No values file at $GITOPS_VALUES_PATH" >&2; exit 1; }
    - yq eval -i "$GITOPS_IMAGE_KEY = \"$IMAGE_TAG\"" "$GITOPS_VALUES_PATH"
    - git add "$GITOPS_VALUES_PATH"
    - |
      if git diff --cached --quiet; then
        echo "Image tag already at $IMAGE_TAG — nothing to deploy."
        exit 0
      fi
    - 'git commit -m "deploy($APP_NAME): $ENVIRONMENT -> $IMAGE_TAG" -m "source: $CI_PROJECT_URL/-/commit/$CI_COMMIT_SHA"'
    # Retry once on push race with other pipelines writing to the GitOps repo.
    - git push origin "$GITOPS_BRANCH" || { git pull --rebase origin "$GITOPS_BRANCH" && git push origin "$GITOPS_BRANCH"; }

deploy:dev:
  extends: .deploy:gitops
  variables:
    ENVIRONMENT: dev
  environment:
    name: dev
  needs: ["build:image"]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

deploy:staging:
  extends: .deploy:gitops
  variables:
    ENVIRONMENT: staging
  environment:
    name: staging
  needs: ["deploy:dev"]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: true

deploy:production:
  extends: .deploy:gitops
  variables:
    ENVIRONMENT: production
  environment:
    name: production
  needs: ["deploy:staging"]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: true
  # Production deploys should be protected: mark the 'production' environment
  # as protected in GitLab so only allowed users can trigger this job.
