# ============================================================================
# helm.gitlab-ci.yml — package charts and publish to the GitLab Helm registry
#
# On v* tags every chart under charts/ is packaged and pushed to this
# project's Helm package registry (channel: stable). MR pipelines get a
# dry-run package as a sanity check.
#
# Consumers then add:
#   helm repo add myrepo https://gitlab.example.com/api/v4/projects/<id>/packages/helm/stable
# ============================================================================

.helm:package:
  stage: package
  image:
    name: "$HELM_IMAGE"
    entrypoint: [""]
  variables:
    HELM_CHANNEL: "stable"
  before_script:
    - apk add --no-cache git curl >/dev/null
    - helm plugin install https://github.com/chartmuseum/helm-push 2>/dev/null || true
  script:
    - mkdir -p .packaged
    - |
      for chart in $(find charts -name Chart.yaml -maxdepth 3 -exec dirname {} \;); do
        echo "==> Packaging $chart"
        helm dependency build "$chart" 2>/dev/null || true
        helm package "$chart" --destination .packaged
      done
  artifacts:
    expire_in: 7 days
    paths:
      - .packaged/

helm:package-dry-run:
  extends: .helm:package
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      exists: { paths: ["charts/**/Chart.yaml"] }

helm:publish:
  extends: .helm:package
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
      exists: { paths: ["charts/**/Chart.yaml"] }
  script:
    - !reference [".helm:package", script]
    - |
      for pkg in .packaged/*.tgz; do
        echo "==> Publishing $pkg to channel $HELM_CHANNEL"
        curl --fail-with-body --request POST \
          --user "gitlab-ci-token:$CI_JOB_TOKEN" \
          --form "chart=@$pkg" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/helm/api/$HELM_CHANNEL/charts"
        echo
      done
